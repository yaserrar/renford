version: "3.9"

services:
  renford-api:
    container_name: "renford-api"
    build:
      context: ./renford-api
      dockerfile: Dockerfile
    env_file:
      - ./renford-api/.env
    restart: always
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  minio:
    container_name: "renford-minio"
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    restart: always
    networks:
      - network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=network
      # S3 API — utilisé par le backend
      - traefik.http.routers.renford-minio-api.rule=Host(`minio.${DOMAIN_NAME}`)
      - traefik.http.routers.renford-minio-api.entrypoints=websecure
      - traefik.http.routers.renford-minio-api.tls.certresolver=letsencryptresolver
      - traefik.http.routers.renford-minio-api.service=renford-minio-api
      - traefik.http.services.renford-minio-api.loadbalancer.server.port=9000
      # Console d'administration MinIO
      - traefik.http.routers.renford-minio-console.rule=Host(`minio-console.${DOMAIN_NAME}`)
      - traefik.http.routers.renford-minio-console.entrypoints=websecure
      - traefik.http.routers.renford-minio-console.tls.certresolver=letsencryptresolver
      - traefik.http.routers.renford-minio-console.service=renford-minio-console
      - traefik.http.services.renford-minio-console.loadbalancer.server.port=9001

  renford-nginx:
    container_name: "renford-nginx"
    build: ./nginx
    restart: always
    depends_on:
      - renford-api
    networks:
      - network
    labels:
      - traefik.enable=true
      - traefik.docker.network=network
      - traefik.http.routers.renford-nginx.rule=Host(`api.${DOMAIN_NAME}`)
      - traefik.http.routers.renford-nginx.entrypoints=websecure
      - traefik.http.routers.renford-nginx.tls.certresolver=letsencryptresolver
      - traefik.http.services.renford-nginx.loadbalancer.server.port=80

  renford-prisma:
    container_name: "renford-prisma"
    build:
      context: ./renford-api/prisma
      dockerfile: Dockerfile
    env_file:
      - ./renford-api/.env
    restart: always
    networks:
      - network
    labels:
      - traefik.enable=true
      - traefik.docker.network=network
      - traefik.http.routers.renford-prisma.rule=Host(`prisma.${DOMAIN_NAME}`)
      - traefik.http.routers.renford-prisma.entrypoints=websecure
      - traefik.http.routers.renford-prisma.tls.certresolver=letsencryptresolver
      - traefik.http.services.renford-prisma.loadbalancer.server.port=5000

  renford-dashboard:
    container_name: "renford-dashboard"
    build:
      context: ./renford-dashboard
      dockerfile: Dockerfile
    env_file:
      - ./renford-dashboard/.env
    restart: always
    networks:
      - network
    labels:
      - traefik.enable=true
      - traefik.docker.network=network
      - traefik.http.routers.renford-dashboard.rule=Host(`app.${DOMAIN_NAME}`)
      - traefik.http.routers.renford-dashboard.entrypoints=websecure
      - traefik.http.routers.renford-dashboard.tls.certresolver=letsencryptresolver
      - traefik.http.services.renford-dashboard.loadbalancer.server.port=80

networks:
  network:
    name: "network"
    driver: bridge

volumes:
  minio-data:
